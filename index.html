<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialSafety Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{display:flex;background:#f4f6f9}

/* Sidebar */
.sidebar{
width:260px;
background:#0f172a;
color:white;
height:100vh;
position:fixed;
padding:25px 15px;
}

.logo{font-size:20px;font-weight:600;margin-bottom:30px}

.nav-item{
padding:12px 15px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
display:flex;
align-items:center;
}

.nav-item:hover{background:#1e293b}
.active{background:#2563eb}

/* Main */
.main{
margin-left:260px;
width:100%;
padding:30px;
}

h1{margin-bottom:20px}

/* Cards */
.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card h3{font-size:14px;color:gray;margin-bottom:10px}
.card h2{font-size:28px}

/* Charts */
.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.chart-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* Alerts */
.alert-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.alert{
padding:15px;
border-left:5px solid red;
margin-top:15px;
border-radius:10px;
background:#f9fafb;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.btn-primary{background:#2563eb;color:white}
.btn-secondary{background:#e5e7eb}

/* Status colors */
.acknowledged{border-left-color:green}
.false{border-left-color:gray; opacity:0.6}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">SocialSafety</div>
<div class="nav-item active">Dashboard</div>
<div class="nav-item">Alert Stream</div>
<div class="nav-item">Map View</div>
<div class="nav-item">Response Teams</div>
<div class="nav-item">Analytics</div>
<div class="nav-item">Settings</div>
</div>

<div class="main">
<h1>Command Dashboard</h1>

<div class="card-container">
<div class="card"><h3>Total Alerts</h3><h2>8</h2></div>
<div class="card"><h3>New / Unassigned</h3><h2>3</h2></div>
<div class="card"><h3>In Progress</h3><h2>2</h2></div>
<div class="card"><h3>Resolved Today</h3><h2>1</h2></div>
<div class="card"><h3>Avg Response</h3><h2>22m</h2></div>
</div>

<div class="chart-grid">
<div class="chart-box">
<h3>Alerts by Severity</h3>
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<h3>Alert Volume (24h)</h3>
<canvas id="lineChart"></canvas>
</div>
</div>

<div class="alert-box">
<h3>Live Alert Stream</h3>

<div id="alerts"></div>

</div>
</div>

<script>
/* =========================
   LOAD ALERTS FROM BACKEND
========================= */
async function loadAlerts(){
  const res = await fetch("http://localhost:3000/api/alerts");
  const data = await res.json();

  const container = document.getElementById("alerts");
  container.innerHTML = "";

  data.forEach(alert=>{
    const div = document.createElement("div");
    div.className = "alert " + (alert.status === "acknowledged" ? "acknowledged" : "") + (alert.status === "false_alarm" ? " false" : "");

    div.innerHTML = `
      <strong>${alert.text}</strong> (${alert.status})<br>
      <button class="btn-primary" onclick="ack(${alert.id})">Acknowledge</button>
      <button class="btn-secondary" onclick="falseAlarm(${alert.id})">False Alarm</button>
    `;

    container.appendChild(div);
  });
}

/* =========================
   BUTTON ACTIONS
========================= */
async function ack(id){
  await fetch(`http://localhost:3000/api/alerts/${id}/acknowledge`, {
    method: "POST"
  });
  loadAlerts();
}

async function falseAlarm(id){
  await fetch(`http://localhost:3000/api/alerts/${id}/false`, {
    method: "POST"
  });
  loadAlerts();
}

/* =========================
   INITIAL LOAD
========================= */
loadAlerts();

/* =========================
   CHARTS
========================= */
new Chart(document.getElementById('barChart'),{
type:'bar',
data:{
labels:['Critical','High','Medium','Low'],
datasets:[{
data:[2,3,5,4],
backgroundColor:['#ef4444','#f97316','#eab308','#3b82f6']
}]
}
});

new Chart(document.getElementById('lineChart'),{
type:'line',
data:{
labels:['12am','3am','6am','9am','12pm','3pm','6pm','9pm'],
datasets:[{
data:[3,1,4,7,12,15,9,6],
borderColor:'#2563eb',
fill:false
}]
}
});
</script>

</body>
</html>
